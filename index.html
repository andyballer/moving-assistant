<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Moving Assistant</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007aff">
  <link rel="icon" href="src/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="src/assets/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Moving">
</head>
<body>
  <div id="move-tracker-root">
    <div class="mt-loading" id="mt-loading">Loading the move…</div>
    <div id="mt-app" style="display:none;"></div>
  </div>

  <script src="src/js/state.js"></script>
  <script src="src/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // Check for a newer version every time the app is opened.
          reg.update();
        }).catch((err) => console.error('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
