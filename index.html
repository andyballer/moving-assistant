<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Moving Assistant</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007aff">
  <link rel="icon" href="src/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="src/assets/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Moving">
</head>
<body>
  <div id="move-tracker-root">
    <div class="mt-loading" id="mt-loading">Loading the move…</div>
    <div id="mt-app" style="display:none;"></div>
  </div>

  <script src="src/js/state.js"></script>
  <script src="src/js/apartments.js"></script>
  <script src="src/js/boxes.js"></script>
  <script src="src/js/movers.js"></script>
  <script src="src/js/dashboard.js"></script>
  <script src="src/js/rooms.js"></script>
  <script src="src/js/utilities.js"></script>
  <script src="src/js/deadlines.js"></script>
  <script src="src/js/dayof.js"></script>
  <script src="src/js/savings.js"></script>
  <script src="src/js/supplies.js"></script>
  <script src="src/js/tasks.js"></script>
  <script src="src/js/app.js"></script>
  <script>
    function showAppUpdateToast(registration) {
      if (document.getElementById('mt-update-toast')) return;
      const toast = document.createElement('div');
      toast.id = 'mt-update-toast';
      toast.innerHTML = '<span>Fresh moving magic is ready.</span><button type="button">Update</button>';
      toast.querySelector('button').addEventListener('click', () => {
        if (registration.waiting) registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      });
      document.body.appendChild(toast);
    }

    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          if (reg.waiting && navigator.serviceWorker.controller) showAppUpdateToast(reg);
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) showAppUpdateToast(reg);
            });
          });
          reg.update();
        }).catch((err) => console.error('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
